###################
### KEYBINDINGS ###
###################

# Edit extra keybinds
bind = Ctrl+Super+Alt, K, exec, kitty -e nano ~/.config/hypr/arisu/custom/keybinds.conf


# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, layoutmsg, togglesplit # dwindle

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
# french :)
bind = $mainMod, ampersand,  workspace, 1
bind = $mainMod, eacute,     workspace, 2
bind = $mainMod, quotedbl,   workspace, 3
bind = $mainMod, apostrophe, workspace, 4
bind = $mainMod, parenleft,  workspace, 5
bind = $mainMod, minus,      workspace, 6
bind = $mainMod, egrave,     workspace, 7
bind = $mainMod, underscore, workspace, 8
bind = $mainMod, ccedilla,   workspace, 9
bind = $mainMod, agrave,     workspace, 10


# Switch workspaces relatively with mainMod + arrows / ctrl
bind = $mainMod,      right, workspace, +1
bind = $mainMod,      left,  workspace, -1
bind = $mainMod+CTRL, left,  workspace, -9
bind = $mainMod+CTRL, right, workspace, +9



# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1   # movetoworkspace
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2   # movetoworkspace
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3   # movetoworkspace
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4   # movetoworkspace
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5   # movetoworkspace
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6   # movetoworkspace
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7   # movetoworkspace
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8   # movetoworkspace
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9   # movetoworkspace
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10  # movetoworkspace
# french :)
bind = SUPER+SHIFT, ampersand,  movetoworkspacesilent, 1
bind = SUPER+SHIFT, eacute,     movetoworkspacesilent, 2
bind = SUPER+SHIFT, quotedbl,   movetoworkspacesilent, 3
bind = SUPER+SHIFT, apostrophe, movetoworkspacesilent, 4
bind = SUPER+SHIFT, parenleft,  movetoworkspacesilent, 5
bind = SUPER+SHIFT, minus,      movetoworkspacesilent, 6
bind = SUPER+SHIFT, egrave,     movetoworkspacesilent, 7
bind = SUPER+SHIFT, underscore, movetoworkspacesilent, 8
bind = SUPER+SHIFT, ccedilla,   movetoworkspacesilent, 9
bind = SUPER+SHIFT, agrave,     movetoworkspacesilent, 10 


# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


# Launcher / Workspace overview
bindr = $mainMod, SUPER_L, exec, pkill $menu || $menu
bind =  $mainMod, TAB,     exec, qs ipc -c $qsConfig call overview toggle